<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SBK Intranet</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --verde-escuro: #0A4A3A;
      --verde-medio: #1A7A5E;
      --verde-menta: #3DB896;
      --fundo: #EAECEA;
      --texto: #111111;
      --branco: #ffffff;
      --sombra: 0 2px 8px rgba(10,74,58,0.10);
      --sombra-hover: 0 6px 20px rgba(10,74,58,0.18);
    }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: 'Inter', sans-serif;
      background: var(--fundo);
      color: var(--texto);
    }

    body {
      display: flex;
      flex-direction: column;
    }

    /* ── HEADER ── */
    header {
      flex-shrink: 0;
      background: var(--verde-escuro);
      color: var(--branco);
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 28px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.18);
      z-index: 100;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      color: var(--branco);
    }

    .logo-text {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 0.04em;
      color: var(--branco);
    }

    .current-date {
      font-size: 11px;
      font-weight: 400;
      color: rgba(255,255,255,0.65);
      text-transform: capitalize;
    }

    /* ── SERVICE DESK BANNER ── */
    .service-desk-banner {
      flex-shrink: 0;
      background: var(--verde-escuro);
      padding: 0 28px;
    }

    .service-desk-link {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 10px 0;
      text-decoration: none;
      color: var(--branco);
      transition: background 0.2s ease;
      border-bottom: 2px solid var(--verde-menta);
    }

    .service-desk-link:hover {
      background: var(--verde-medio);
    }

    .sd-label {
      display: flex;
      flex-direction: column;
      gap: 1px;
    }

    .sd-title {
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.02em;
      color: var(--branco);
    }

    .sd-subtitle {
      font-size: 11px;
      font-weight: 400;
      color: rgba(255,255,255,0.65);
    }

    .sd-arrow {
      margin-left: 6px;
      opacity: 0.7;
    }

    /* ── MAIN ── */
    main {
      flex: 1;
      overflow: hidden;
      padding: 14px 20px;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    /* ── VIEW SWITCHING ── */
    .view {
      display: none;
      flex: 1;
      min-height: 0;
      flex-direction: column;
    }

    .view.active {
      display: flex;
    }

    /* ── HOME GRID (3×2) ── */
    .home-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(2, 1fr);
      gap: 12px;
      flex: 1;
      min-height: 0;
    }

    /* ── GROUP BUTTON ── */
    .group-btn {
      background: var(--branco);
      border: 1.5px solid transparent;
      border-radius: 12px;
      box-shadow: var(--sombra);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      cursor: pointer;
      padding: 16px;
      transition: background 0.2s ease, box-shadow 0.2s ease, transform 0.15s ease, border-color 0.2s ease;
      font-family: 'Inter', sans-serif;
    }

    .group-btn:hover {
      background: var(--verde-escuro);
      color: var(--branco);
      box-shadow: var(--sombra-hover);
      transform: translateY(-2px);
      border-color: var(--verde-menta);
    }

    .group-btn .btn-icon {
      width: 36px;
      height: 36px;
      color: var(--verde-menta);
      transition: color 0.2s ease;
      flex-shrink: 0;
    }

    .group-btn:hover .btn-icon {
      color: var(--branco);
    }

    .group-btn .btn-label {
      font-size: 14px;
      font-weight: 600;
      color: var(--texto);
      transition: color 0.2s ease;
      text-align: center;
      line-height: 1.3;
    }

    .group-btn:hover .btn-label {
      color: var(--branco);
    }

    /* ── GROUP DETAIL VIEW ── */
    .group-header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 14px;
      flex-shrink: 0;
    }

    .back-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--verde-escuro);
      color: var(--branco);
      border: none;
      border-radius: 8px;
      padding: 7px 14px;
      font-size: 13px;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: background 0.2s ease;
      flex-shrink: 0;
    }

    .back-btn:hover {
      background: var(--verde-medio);
    }

    .group-screen-title {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--verde-medio);
    }

    /* ── LINKS GRID (detail screen) ── */
    .links-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 12px;
      align-content: start;
      flex: 1;
      min-height: 0;
    }

    /* ── INNER CARD (link tile) ── */
    .inner-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 20px 12px;
      background: var(--branco);
      border-radius: 8px;
      box-shadow: var(--sombra);
      text-decoration: none;
      color: var(--texto);
      transition: background 0.2s ease, color 0.2s ease, box-shadow 0.2s ease, transform 0.15s ease;
      cursor: pointer;
      border: 1.5px solid transparent;
    }

    .inner-card:hover {
      background: var(--verde-escuro);
      color: var(--branco);
      box-shadow: var(--sombra-hover);
      transform: translateY(-2px);
      border-color: var(--verde-menta);
    }

    .inner-card .card-icon {
      width: 32px;
      height: 32px;
      color: var(--verde-menta);
      flex-shrink: 0;
      transition: color 0.2s ease;
    }

    .inner-card img.card-icon {
      object-fit: contain;
      color: unset;
    }

    .inner-card:hover .card-icon {
      color: var(--branco);
    }

    .inner-card .card-name {
      font-size: 13px;
      font-weight: 600;
      text-align: center;
      line-height: 1.3;
      transition: color 0.2s ease;
    }
  </style>
</head>

          btn.setAttribute('data-group', group.id);
          btn.innerHTML = group.icon + '<span class="btn-label">' + group.label + '</span>';
          btn.addEventListener('click', function () { showGroup(group.id); });
          grid.appendChild(btn);
        });

        container.innerHTML = '';

          a.className = 'inner-card';
          a.href = link.href;
          a.target = '_blank';
          a.rel = 'noopener noreferrer';
          a.innerHTML = link.icon + '<span class="card-name">' + link.name + '</span>';
          container.appendChild(a);
        });

        if (group.subgroups) {
          group.subgroups.forEach(function (sub) {
            var btn = document.createElement('button');
            btn.className = 'inner-card';
            btn.innerHTML = sub.icon + '<span class="card-name">' + sub.label + '</span>';
            btn.addEventListener('click', function () { showSubGroup(group.id, sub.id); });
            container.appendChild(btn);
          });
        }

        document.getElementById('btn-back').onclick = showHome;

          container.appendChild(a);
        });

        document.getElementById('btn-back').onclick = function () { showGroup(parentGroupId); };
      }

      function showHome() {
        document.getElementById('view-group').classList.remove('active');
        document.getElementById('view-home').classList.add('active');
      }

      document.getElementById('btn-back').onclick = showHome;

      renderHomeGrid();

    })();
  </script>

</body>
</html>
