<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SBK Intranet</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --verde-escuro: #0A4A3A;
      --verde-medio: #1A7A5E;
      --verde-menta: #3DB896;
      --fundo: #EAECEA;
      --texto: #111111;
      --branco: #ffffff;
      --sombra: 0 2px 8px rgba(10,74,58,0.10);
      --sombra-hover: 0 6px 20px rgba(10,74,58,0.18);
    }

    html {
      font-family: 'Inter', sans-serif;
      background: var(--fundo);
      color: var(--texto);
      scroll-behavior: smooth;
    }

    /* ── HEADER ── */
    header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      background: var(--verde-escuro);
      color: var(--branco);
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 32px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.18);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      color: var(--branco);
    }

    .logo-text {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 0.04em;
      color: var(--branco);
    }

    .header-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 2px;
    }

    .greeting {
      font-size: 15px;
      font-weight: 600;
      color: var(--verde-menta);
    }

    .current-date {
      font-size: 12px;
      font-weight: 400;
      color: rgba(255,255,255,0.65);
      text-transform: capitalize;
    }

    /* ── SERVICE DESK BANNER ── */
    .service-desk-banner {
      margin-top: 64px;
      background: var(--verde-escuro);
      padding: 0 32px;
    }

    .service-desk-link {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      padding: 18px 0;
      text-decoration: none;
      color: var(--branco);
      transition: background 0.2s ease;
      border-bottom: 3px solid var(--verde-menta);
    }

    .service-desk-link:hover {
      background: var(--verde-medio);
    }

    .sd-label {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .sd-title {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.02em;
      color: var(--branco);
    }

    .sd-subtitle {
      font-size: 12px;
      font-weight: 400;
      color: rgba(255,255,255,0.65);
    }

    .sd-arrow {
      margin-left: 8px;
      opacity: 0.7;
    }

    /* ── MAIN ── */
    main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 36px 24px 60px;
    }

    /* ── CATEGORY SECTION ── */
    .category {
      margin-bottom: 36px;
    }

    .category-title {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.10em;
      text-transform: uppercase;
      color: var(--verde-medio);
      margin-bottom: 14px;
      padding-bottom: 8px;
      border-bottom: 1.5px solid rgba(10,74,58,0.12);
    }

    /* ── CARD GRID ── */
    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
      gap: 14px;
    }

    /* ── CARD ── */
    .card {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 24px 16px;
      background: var(--branco);
      border-radius: 8px;
      box-shadow: var(--sombra);
      text-decoration: none;
      color: var(--texto);
      transition: background 0.2s ease, color 0.2s ease, box-shadow 0.2s ease, transform 0.15s ease;
      cursor: pointer;
      border: 1.5px solid transparent;
      min-height: 130px;
    }

    .card:hover {
      background: var(--verde-escuro);
      color: var(--branco);
      box-shadow: var(--sombra-hover);
      transform: translateY(-2px);
      border-color: var(--verde-menta);
    }

    .card-icon {
      width: 40px;
      height: 40px;
      color: var(--verde-menta);
      transition: color 0.2s ease;
      flex-shrink: 0;
    }

    .card:hover .card-icon {
      color: var(--branco);
    }

    .card-name {
      font-size: 13px;
      font-weight: 600;
      text-align: center;
      line-height: 1.3;
      transition: color 0.2s ease;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 600px) {
      header {
        padding: 0 16px;
        height: 56px;
      }
      .logo-text {
        font-size: 18px;
      }
      .greeting {
        font-size: 13px;
      }
      .current-date {
        font-size: 11px;
      }
      .service-desk-banner {
        padding: 0 16px;
        margin-top: 56px;
      }
      main {
        padding: 24px 16px 48px;
      }
      .card-grid {
        grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
        gap: 10px;
      }
    }
  </style>
</head>
<body>

  <script>
    (function () {
      function pad(n) { return n < 10 ? '0' + n : n; }

      function update() {
        var now = new Date();
        var hour = now.getHours();
        var greeting = hour < 12 ? 'Bom dia' : hour < 18 ? 'Boa tarde' : 'Boa noite';
        document.getElementById('greeting').textContent = greeting;

        var options = {
          weekday: 'long',
          day: 'numeric',
          month: 'long',
          year: 'numeric'
        };
        var dateStr = now.toLocaleDateString('pt-BR', options);
        // Capitalise first letter
        dateStr = dateStr.charAt(0).toUpperCase() + dateStr.slice(1);
        document.getElementById('current-date').textContent = dateStr;
      }

      update();
      // Refresh every minute so greeting updates at the boundary
      setInterval(update, 60000);
    })();
  <\/script>
