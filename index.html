<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SBK Intranet</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --verde-escuro: #0A4A3A;
      --verde-medio: #1A7A5E;
      --verde-menta: #3DB896;
      --fundo: #EBEDEB;
      --texto: #111111;
      --branco: #ffffff;
      --sombra: 0 2px 8px rgba(10,74,58,0.10);
      --sombra-hover: 0 6px 20px rgba(10,74,58,0.18);

      /* Tints de fundo por categoria */
      --acc-operacional:  #E8F5F1;
      --acc-financeiro:   #E8F0F5;
      --acc-comunicacao:  #F0EDF8;
      --acc-sites:        #EEF5E8;
      --acc-canais:       #F5EDE8;
      --acc-treinamento:  #E8F2F8;

      /* Cores de ícone por categoria */
      --ico-operacional:  #1A7A5E;
      --ico-financeiro:   #3A6E8F;
      --ico-comunicacao:  #6B5DAF;
      --ico-sites:        #4A7A2E;
      --ico-canais:       #A05A2E;
      --ico-treinamento:  #2E6A8F;

      /* Estruturais */
      --border-subtle: rgba(10,74,58,0.08);
      --radius-card: 14px;
      --shadow-card: 0 1px 4px rgba(10,74,58,0.08), 0 4px 16px rgba(10,74,58,0.07);
      --shadow-card-hover: 0 4px 12px rgba(10,74,58,0.15), 0 12px 32px rgba(10,74,58,0.14);
    }

    html, body {
      height: 100%;
      font-family: 'Inter', sans-serif;
      color: var(--texto);
    }

    body {
      display: flex;
      flex-direction: column;
      min-height: 100%;
      background-color: var(--fundo);
      background-image: radial-gradient(circle, rgba(10,74,58,0.09) 1px, transparent 1px);
      background-size: 24px 24px;
    }

    /* ── HEADER ── */
    header {
      flex-shrink: 0;
      background: var(--verde-escuro);
      color: var(--branco);
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 28px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.22);
      border-bottom: 2px solid var(--verde-menta);
      z-index: 100;
      position: relative;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      color: var(--branco);
    }

    .logo-text {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 0.04em;
      color: var(--branco);
    }

    .logo-brand {
      display: flex;
      flex-direction: column;
      gap: 1px;
    }

    .logo-subtitle {
      font-size: 10px;
      font-weight: 500;
      color: rgba(255,255,255,0.5);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .current-date {
      font-size: 11px;
      font-weight: 400;
      color: rgba(255,255,255,0.65);
      text-transform: capitalize;
    }

    /* ── SERVICE DESK BANNER ── */
    .service-desk-banner {
      flex-shrink: 0;
      background: transparent;
      padding: 14px 20px 2px;
    }

    .service-desk-link {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 11px 16px;
      text-decoration: none;
      color: var(--verde-escuro);
      transition: background 0.2s ease, box-shadow 0.2s ease;
      max-width: 860px;
      margin: 0 auto;
      border-radius: 10px;
      background: var(--branco);
      border: 1.5px solid var(--border-subtle);
      border-left: 3px solid var(--verde-menta);
      box-shadow: var(--shadow-card);
    }

    .service-desk-link:hover {
      background: rgba(61,184,150,0.06);
      box-shadow: var(--shadow-card-hover);
    }

    .sd-icon-wrap {
      width: 34px;
      height: 34px;
      background: rgba(61,184,150,0.15);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .sd-label {
      display: flex;
      flex-direction: column;
      gap: 1px;
    }

    .sd-title {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.01em;
      color: var(--verde-escuro);
    }

    .sd-subtitle {
      font-size: 11px;
      font-weight: 400;
      color: rgba(10,74,58,0.55);
    }

    .sd-badge {
      margin-left: auto;
      background: rgba(61,184,150,0.15);
      color: var(--verde-medio);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 3px 8px;
      border-radius: 20px;
      border: 1px solid rgba(61,184,150,0.3);
    }

    .sd-arrow {
      opacity: 0.45;
      color: var(--verde-medio);
      flex-shrink: 0;
    }

    /* ── MAIN ── */
    main {
      flex: 1;
      overflow-y: auto;
      padding: 0;
      display: flex;
      flex-direction: column;
    }

    /* ── VIEW SWITCHING ── */
    .view {
      display: none;
      flex-direction: column;
    }

    .view.active {
      display: flex;
    }

    /* Home: centralizada, sem esticar */
    #view-home {
      align-items: center;
      padding: 0 20px 48px;
    }

    /* Group detail: preenche a altura */
    #view-group {
      flex: 1;
      min-height: 0;
      padding: 20px;
    }

    /* ── GREETING SECTION ── */
    .greeting-section {
      width: 100%;
      max-width: 860px;
      padding: 36px 0 24px;
    }

    .greeting-inner {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }

    .greeting-text {
      font-size: 28px;
      font-weight: 700;
      color: var(--verde-escuro);
      letter-spacing: -0.02em;
    }

    .greeting-date {
      font-size: 13px;
      font-weight: 400;
      color: rgba(10,74,58,0.55);
      text-transform: capitalize;
    }

    .greeting-subtitle {
      font-size: 14px;
      font-weight: 400;
      color: rgba(10,74,58,0.55);
      margin-top: 4px;
    }

    .greeting-divider {
      width: 40px;
      height: 3px;
      background: var(--verde-menta);
      border-radius: 2px;
      margin-top: 16px;
    }

    /* ── HOME GRID (3×2) ── */
    .home-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      width: 100%;
      max-width: 860px;
    }

    /* ── GROUP BUTTON ── */
    .group-btn {
      background: var(--branco);
      border: 1.5px solid var(--border-subtle);
      border-radius: var(--radius-card);
      box-shadow: var(--shadow-card);
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: space-between;
      gap: 0;
      cursor: pointer;
      padding: 20px 20px 16px;
      transition: background 0.2s ease, box-shadow 0.2s ease, transform 0.15s ease, border-color 0.2s ease;
      font-family: 'Inter', sans-serif;
      min-height: 140px;
      text-align: left;
      position: relative;
      overflow: hidden;
    }

    /* Faixa colorida no topo por categoria */
    .group-btn::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      border-radius: var(--radius-card) var(--radius-card) 0 0;
      transition: opacity 0.2s ease;
    }
    .group-btn[data-group="operacional"]::before { background: var(--ico-operacional); }
    .group-btn[data-group="financeiro"]::before  { background: var(--ico-financeiro); }
    .group-btn[data-group="comunicacao"]::before { background: var(--ico-comunicacao); }
    .group-btn[data-group="sites"]::before       { background: var(--ico-sites); }
    .group-btn[data-group="canais"]::before      { background: var(--ico-canais); }
    .group-btn[data-group="treinamento"]::before { background: var(--ico-treinamento); }
    .group-btn:hover::before { opacity: 0; }

    /* Tint de fundo por categoria */
    .group-btn[data-group="operacional"]  { background: var(--acc-operacional); }
    .group-btn[data-group="financeiro"]   { background: var(--acc-financeiro); }
    .group-btn[data-group="comunicacao"]  { background: var(--acc-comunicacao); }
    .group-btn[data-group="sites"]        { background: var(--acc-sites); }
    .group-btn[data-group="canais"]       { background: var(--acc-canais); }
    .group-btn[data-group="treinamento"]  { background: var(--acc-treinamento); }

    /* Cor de ícone por categoria */
    .group-btn[data-group="operacional"]  .btn-icon { color: var(--ico-operacional); }
    .group-btn[data-group="financeiro"]   .btn-icon { color: var(--ico-financeiro); }
    .group-btn[data-group="comunicacao"]  .btn-icon { color: var(--ico-comunicacao); }
    .group-btn[data-group="sites"]        .btn-icon { color: var(--ico-sites); }
    .group-btn[data-group="canais"]       .btn-icon { color: var(--ico-canais); }
    .group-btn[data-group="treinamento"]  .btn-icon { color: var(--ico-treinamento); }

    .group-btn:hover {
      background: var(--verde-escuro);
      color: var(--branco);
      box-shadow: var(--shadow-card-hover);
      transform: translateY(-3px);
      border-color: var(--verde-menta);
    }

    .btn-icon-wrap {
      width: 44px;
      height: 44px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255,255,255,0.70);
      margin-bottom: 12px;
      flex-shrink: 0;
      transition: background 0.2s ease;
    }

    .group-btn:hover .btn-icon-wrap {
      background: rgba(255,255,255,0.12);
    }

    .group-btn .btn-icon {
      width: 22px;
      height: 22px;
      transition: color 0.2s ease;
      flex-shrink: 0;
    }

    .group-btn:hover .btn-icon {
      color: rgba(255,255,255,0.85);
    }

    .btn-footer {
      display: flex;
      flex-direction: column;
      gap: 3px;
      width: 100%;
    }

    .group-btn .btn-label {
      font-size: 13px;
      font-weight: 700;
      color: var(--texto);
      transition: color 0.2s ease;
      text-align: left;
      line-height: 1.3;
      letter-spacing: 0.01em;
    }

    .group-btn:hover .btn-label {
      color: var(--branco);
    }

    .btn-count {
      font-size: 11px;
      font-weight: 500;
      color: rgba(10,74,58,0.45);
      transition: color 0.2s ease;
      letter-spacing: 0.02em;
    }

    .group-btn:hover .btn-count {
      color: rgba(255,255,255,0.55);
    }

    /* Círculo decorativo no canto */
    .group-btn::after {
      content: '';
      position: absolute;
      right: -10px;
      bottom: -10px;
      width: 68px;
      height: 68px;
      border-radius: 50%;
      background: rgba(10,74,58,0.05);
      transition: background 0.2s ease;
      pointer-events: none;
    }

    .group-btn:hover::after {
      background: rgba(255,255,255,0.07);
    }

    /* ── GROUP DETAIL VIEW ── */
    .group-view-inner {
      max-width: 860px;
      width: 100%;
      margin: 0 auto;
      padding: 4px 0 40px;
    }

    /* Breadcrumb */
    .breadcrumb {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 16px;
      flex-shrink: 0;
    }

    .breadcrumb-home {
      background: none;
      border: none;
      padding: 0;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 500;
      color: var(--verde-medio);
      display: flex;
      align-items: center;
      gap: 5px;
      transition: color 0.15s ease;
    }

    .breadcrumb-home:hover {
      color: var(--verde-escuro);
    }

    .breadcrumb-sep {
      color: rgba(10,74,58,0.3);
      font-size: 13px;
      line-height: 1;
      user-select: none;
    }

    .breadcrumb-current {
      font-size: 13px;
      font-weight: 600;
      color: var(--verde-escuro);
    }

    .group-detail-title {
      font-size: 20px;
      font-weight: 700;
      color: var(--verde-escuro);
      letter-spacing: -0.01em;
      margin-bottom: 20px;
      flex-shrink: 0;
      padding-left: 12px;
      border-left: 3px solid var(--verde-menta);
    }

    /* ── LINKS GRID (detail screen) ── */
    .links-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 14px;
      align-content: start;
    }

    /* ── INNER CARD (link tile) ── */
    .inner-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 22px 14px;
      background: var(--branco);
      border-radius: 10px;
      box-shadow: var(--shadow-card);
      text-decoration: none;
      color: var(--texto);
      transition: background 0.2s ease, color 0.2s ease, box-shadow 0.2s ease, transform 0.15s ease;
      cursor: pointer;
      border: 1.5px solid var(--border-subtle);
    }

    .inner-card:hover {
      background: var(--verde-escuro);
      color: var(--branco);
      box-shadow: var(--shadow-card-hover);
      transform: translateY(-2px);
      border-color: var(--verde-menta);
    }

    .inner-card .card-icon {
      width: 32px;
      height: 32px;
      color: var(--verde-menta);
      flex-shrink: 0;
      transition: color 0.2s ease;
    }

    .inner-card img.card-icon {
      object-fit: contain;
      color: unset;
    }

    .inner-card:hover .card-icon {
      color: var(--branco);
    }

    .inner-card .card-name {
      font-size: 13px;
      font-weight: 600;
      text-align: center;
      line-height: 1.3;
      transition: color 0.2s ease;
    }

    /* ── FOOTER ── */
    footer {
      flex-shrink: 0;
      background: var(--verde-escuro);
      color: rgba(255,255,255,0.40);
      text-align: center;
      font-size: 11px;
      font-weight: 400;
      padding: 14px 28px;
      letter-spacing: 0.03em;
      border-top: 1px solid rgba(61,184,150,0.25);
    }
  </style>
</head>

  <!-- ── HEADER ── -->

        <span class="logo-text">SBK</span>

    <span class="current-date" id="current-date"></span>

  <!-- ── SERVICE DESK BANNER ── -->

          <path d="M3 18v-6a9 9 0 0118 0v6"/>

  <!-- ── MAIN CONTENT ── -->
  <main>

    <!-- HOME VIEW -->
    <div id="view-home" class="view active">

      <!-- SAUDAÇÃO -->
      <div class="greeting-section">
        <div class="greeting-inner">
          <p class="greeting-text" id="greeting-text"></p>
          <p class="greeting-date" id="greeting-date"></p>

      <div class="home-grid" id="home-grid"></div>

    </div>

    <!-- GROUP DETAIL VIEW -->
    <div id="view-group" class="view">
      <div class="group-view-inner">

        <!-- BREADCRUMB -->

            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
              <polyline points="9 22 9 12 15 12 15 22"/>
            </svg>
            Início
          </button>
          <span class="breadcrumb-sep">/</span>
          <span id="group-title" class="breadcrumb-current"></span>
        </nav>

        <!-- TÍTULO DA PÁGINA -->
        <h2 id="group-detail-title" class="group-detail-title"></h2>

        <!-- LINKS -->
        <div id="group-links" class="links-grid"></div>

      </div>
    </div>

  </main>

  <!-- ── FOOTER ── -->
  <footer>
    <span>SBK &copy; 2025 &middot; Todos os direitos reservados</span>
  </footer>

  <script>
    (function () {

      /* ── SAUDAÇÃO E DATA ── */
      function getGreeting() {
        var h = new Date().getHours();
        if (h >= 5 && h < 12)  return 'Bom dia';
        if (h >= 12 && h < 18) return 'Boa tarde';
        return 'Boa noite';
      }

      function updateDateAndGreeting() {
        var now = new Date();
        var options = { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' };
        var dateStr = now.toLocaleDateString('pt-BR', options);
        dateStr = dateStr.charAt(0).toUpperCase() + dateStr.slice(1);

        var headerDate = document.getElementById('current-date');
        if (headerDate) headerDate.textContent = dateStr;

        var greetingText = document.getElementById('greeting-text');
        var greetingDate = document.getElementById('greeting-date');
        if (greetingText) greetingText.textContent = getGreeting();
        if (greetingDate) greetingDate.textContent = dateStr;
      }

      updateDateAndGreeting();
      setInterval(updateDateAndGreeting, 60000);

      /* ── NAVEGAÇÃO ── */
      function getGroupItemCount(group) {
        var total = group.links.length;
        if (group.subgroups) total += group.subgroups.length;
        return total;
      }

      function renderHomeGrid() {
        var grid = document.getElementById('home-grid');
        GROUPS.forEach(function (group) {
          var count = getGroupItemCount(group);
          var countLabel = count === 1 ? '1 item' : count + ' itens';

          var btn = document.createElement('button');
          btn.className = 'group-btn';
          btn.setAttribute('data-group', group.id);
          btn.innerHTML =
            '<div class="btn-icon-wrap">' + group.icon + '</div>' +
            '<div class="btn-footer">' +
              '<span class="btn-label">' + group.label + '</span>' +
              '<span class="btn-count">' + countLabel + '</span>' +
            '</div>';
          btn.addEventListener('click', function () { showGroup(group.id); });
          grid.appendChild(btn);
        });
      }

      function showGroup(groupId) {
        var group = GROUPS.find(function (g) { return g.id === groupId; });

        document.getElementById('group-title').textContent = group.label;
        document.getElementById('group-detail-title').textContent = group.label;

        var container = document.getElementById('group-links');
        container.innerHTML = '';
        group.links.forEach(function (link) {
          var a = document.createElement('a');
          a.className = 'inner-card';
          a.href = link.href;
          a.target = '_blank';
          a.rel = 'noopener noreferrer';
          a.innerHTML = link.icon + '<span class="card-name">' + link.name + '</span>';
          container.appendChild(a);
        });

        if (group.subgroups) {
          group.subgroups.forEach(function (sub) {
            var btn = document.createElement('button');
            btn.className = 'inner-card';
            btn.innerHTML = sub.icon + '<span class="card-name">' + sub.label + '</span>';
            btn.addEventListener('click', function () { showSubGroup(group.id, sub.id); });
            container.appendChild(btn);
          });
        }

        document.getElementById('btn-back').onclick = showHome;
        document.getElementById('view-home').classList.remove('active');
        document.getElementById('view-group').classList.add('active');
      }

      function showSubGroup(parentGroupId, subgroupId) {
        var group = GROUPS.find(function (g) { return g.id === parentGroupId; });
        var sub = group.subgroups.find(function (s) { return s.id === subgroupId; });

        document.getElementById('group-title').textContent = sub.label;
        document.getElementById('group-detail-title').textContent = sub.label;

        var container = document.getElementById('group-links');
        container.innerHTML = '';
        sub.links.forEach(function (link) {
          var a = document.createElement('a');
          a.className = 'inner-card';
          a.href = link.href;
          a.target = '_blank';
          a.rel = 'noopener noreferrer';
          a.innerHTML = link.icon + '<span class="card-name">' + link.name + '</span>';
          container.appendChild(a);
        });

        document.getElementById('btn-back').onclick = function () { showGroup(parentGroupId); };
      }

      function showHome() {
        document.getElementById('view-group').classList.remove('active');
        document.getElementById('view-home').classList.add('active');
      }

      document.getElementById('btn-back').onclick = showHome;

      renderHomeGrid();

    })();
